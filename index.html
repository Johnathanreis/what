<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimento Urológico</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0b141a;display:flex;justify-content:center;align-items:center;height:100vh}
.phone{width:100%;max-width:420px;height:100vh;background:#efeae2;display:flex;flex-direction:column}
.topbar{background:#075e54;color:#fff;padding:10px;display:flex;align-items:center;gap:10px}
.topbar img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.chat{flex:1;padding:12px;overflow:auto}
.msg{max-width:80%;padding:10px;border-radius:10px;margin:6px 0;font-size:14px;white-space:pre-line}
.bot{background:#fff}
.user{background:#dcf8c6;margin-left:auto}
.options{padding:10px}
button{width:100%;margin:4px 0;padding:12px;border-radius:20px;border:none;background:#128c7e;color:#fff;cursor:pointer}
.typing{background:#fff;padding:10px;border-radius:10px;width:60px;display:flex;gap:4px}
.typing div{width:6px;height:6px;background:#999;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>

<div class="phone">

<div class="topbar">
<img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200&auto=format&fit=crop">
<div>
<div><strong>Dr. Rafael - Urologia</strong></div>
<small>online agora</small>
</div>
</div>

<div id="chat" class="chat"></div>
<div id="options" class="options"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function addAudioMessage(src){
const div=document.createElement("div");
div.className="msg bot";

const audio=document.createElement("audio");
audio.src=src;
audio.controls=true;
audio.style.width="100%";

div.appendChild(audio);
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<div></div><div></div><div></div>";
chat.appendChild(typing);
chat.scrollTop=chat.scrollHeight;
return typing;
}

function renderOptions(opts){
options.innerHTML="";
opts.forEach(o=>{
const btn=document.createElement("button");
btn.innerText=o.label;
btn.onclick=()=>{
addMessage(o.label,"user");
options.innerHTML="";
flows[o.next]();
};
options.appendChild(btn);
});
}

const audioMap={
start:"audios/audio1.mp3",
q1:"audios/audio2.mp3",
q2:"audios/audio3.mp3",
q3:"audios/audio4.mp3",
oferta:"audios/audio5.mp3"
};

function botFlow(messages,nextOptions,audioSrc){

const chunks=[];
let buffer=[];
const isQuestion=(t)=>t.trim().endsWith("?");

messages.forEach((m,i)=>{
if(isQuestion(m)){
if(buffer.length){chunks.push(buffer.join("\n"));buffer=[]}
chunks.push(m);
}else{
buffer.push(m);
const next=messages[i+1];
if(!next||isQuestion(next)){
chunks.push(buffer.join("\n"));
buffer=[];
}
}
});

let i=0;

function nextMessage(){

if(i>=chunks.length){
if(nextOptions){renderOptions(nextOptions)}
else{showPlanImage()}
return;
}

if(i===0 && audioSrc){
addAudioMessage(audioSrc);
}

const typing=showTyping();

setTimeout(()=>{
typing.remove();
addMessage(chunks[i],"bot");
i++;
setTimeout(nextMessage,2000);
},1500);
}

nextMessage();
}

function showPlanImage(){
options.innerHTML="";

addMessage(
"Escolha seu tratamento:\n\n1 MES - R$164\n2 MESES - R$199\n3 MESES - R$297",
"bot"
);

const planos=[
{label:"1 MES",value:"1"},
{label:"2 MESES",value:"2"},
{label:"3 MESES",value:"3"}
];

planos.forEach(p=>{
const btn=document.createElement("button");
btn.innerText="Escolher "+p.label;
btn.onclick=()=>{
addMessage(p.label,"user");
flows.redirect(p.value);
};
options.appendChild(btn);
});
}

const flows={

start:()=>botFlow([
"Ola, sou o Dr Rafael.",
"Vou te ajudar de forma discreta.",
"Posso te fazer algumas perguntas?"
],[{label:"Sim",next:"q1"}],audioMap.start),

q1:()=>botFlow([
"Isso acontece com frequencia?"
],[{label:"Sim",next:"q2"},{label:"As vezes",next:"q2"}],audioMap.q1),

q2:()=>botFlow([
"Entendi.",
"Posso te explicar como funciona para você receber?"
],[{label:"Sim",next:"q3"},{label:"Por favor",next:"q3"}],audioMap.q2),

q3:()=>botFlow([
"Certo.",
"Voce quer resolver isso com discricao?"
],[{label:"Sim",next:"oferta"}],audioMap.q3),

oferta:()=>botFlow([
"Perfeito.",
"Existe um protocolo seguro.",
"Sem exposicao.",
"Entrega discreta.",
"Quer ver como funciona?"
],[{label:"Quero ver",next:"final"}],audioMap.oferta),

final:()=>botFlow([
"Funciona assim.",
"Voce recebe em casa.",
"Em embalagem discreta.",
"E paga so na entrega.",
"Sem risco.",
"Agora escolha a duracao do tratamento:"
],null),

redirect:(plano)=>{
const links={
"1":"https://entrega.logzz.com.br/pay/mem4k2o0/promocao-selecao-estimulus---valor-164",
"2":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---2-no-valor-199",
"3":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---3-no-valor-269"
};
window.location.href=links[plano];
}

};

flows.start();

</script>

</body>
</html>
