<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento Urológico</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b141a; display:flex; justify-content:center; }
    .phone { width:100%; max-width:420px; height:100vh; background:#efeae2; display:flex; flex-direction:column; }
    .topbar { background:#075e54; color:#fff; padding:12px; font-weight:bold; }
    .chat { flex:1; padding:12px; overflow:auto; }
    .msg { max-width:80%; padding:10px; border-radius:10px; margin:6px 0; font-size:14px; }
    .bot { background:#fff; }
    .user { background:#dcf8c6; margin-left:auto; }
    .options { padding:10px; }
    button { width:100%; margin:4px 0; padding:12px; border-radius:20px; border:none; background:#128c7e; color:#fff; }
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar" style="display:flex; align-items:center; gap:10px;">
  <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200&auto=format&fit=crop" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
  <div>
    <div>Dr. Rafael • Urologia</div>
    <small style="font-size:11px; opacity:0.8;">online agora</small>
  </div>
</div>
  <div id="chat" class="chat"></div>
  <div id="options" class="options"></div>
</div>

<script>
const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function botFlow(messages, nextOptions){
  for(let i = 0; i < messages.length; i++){
    const msg = messages[i];

    // typing indicator
    const typing = document.createElement("div");
    typing.className = "msg bot";
    typing.innerText = "digitando...";
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    await delay(5000);

    typing.remove();

    // adiciona mensagem
    addMessage(msg, "bot");

    // 🔥 garante pequeno delay entre mensagens para não colar tudo
    if(i < messages.length - 1){
      await delay(1500);
    }
  }

  renderOptions(nextOptions);
}
  renderOptions(nextOptions);
}
  renderOptions(nextOptions);
}

function renderOptions(opts){
  options.innerHTML = "";
  opts.forEach(o=>{
    const btn = document.createElement("button");
    btn.innerText = o.label;
    btn.onclick = ()=>{
      addMessage(o.label, "user");
      options.innerHTML = "";
      flows[o.next]();
    };
    options.appendChild(btn);
  });
}

const flows = {
  start: ()=> botFlow([
    "Olá, sou o Dr. Rafael.",
    "Vou te ajudar de forma rápida e discreta.",
    "Posso te fazer algumas perguntas?"
  ],[
    {label:"Sim", next:"triagem1"},
    {label:"Pode falar", next:"triagem1"}
  ]),

  triagem1: ()=> botFlow([
    "Isso vem acontecendo com frequência?"
  ],[
    {label:"Sim", next:"triagem2"},
    {label:"Às vezes", next:"triagem2"}
  ]),

  triagem2: ()=> botFlow([
    "Entendi.",
    "Isso já afetou sua confiança ou desempenho?"
  ],[
    {label:"Sim", next:"triagem3"},
    {label:"Um pouco", next:"triagem3"}
  ]),

  triagem3: ()=> botFlow([
    "Certo.",
    "Você busca uma solução discreta e segura?"
  ],[
    {label:"Sim", next:"interesse"},
    {label:"Sim, com certeza", next:"interesse"}
  ]),

  interesse: ()=> botFlow([
    "Perfeito.",
    "Existe um protocolo que tem ajudado muitos homens.",
    "Totalmente discreto.",
    "Sem exposição.",
    "Quer entender como funciona?"
  ],[
    {label:"Quero entender", next:"final"}
  ]),

  final: ()=> botFlow([
    "Funciona assim.",
    "Você recebe o produto na sua casa.",
    "Em embalagem totalmente discreta.",
    "E só paga no momento da entrega.",
    "Sem risco.",
    "Quer solicitar o seu agora?"
  ],[
    {label:"Quero receber", next:"redirect"}
  ]),

  redirect: ()=>{
    window.location.href = "https://SEU-LINK-AQUI.com";
  }
};

flows.start();
</script>
</body>
</html>
