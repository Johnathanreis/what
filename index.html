<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento Urológico</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b141a; display:flex; justify-content:center; }
    .phone { width:100%; max-width:420px; height:100vh; background:#efeae2; display:flex; flex-direction:column; }
    .topbar { background:#075e54; color:#fff; padding:12px; font-weight:bold; }
    .chat { flex:1; padding:12px; overflow:auto; }
    .msg { max-width:80%; padding:10px; border-radius:10px; margin:6px 0; font-size:14px; }
    .bot { background:#fff; }
    .user { background:#dcf8c6; margin-left:auto; }
    .options { padding:10px; }
    button { width:100%; margin:4px 0; padding:12px; border-radius:20px; border:none; background:#128c7e; color:#fff; }
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar">Atendimento Urológico</div>
  <div id="chat" class="chat"></div>
  <div id="options" class="options"></div>
</div>

<script>
const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function delay(ms){ return new Promise(r=>setTimeout(r,5000)); }

async function botFlow(messages, nextOptions){
  for(const msg of messages){
    await delay(5000);
    addMessage(msg, "bot");
  }
  renderOptions(nextOptions);
}

function renderOptions(opts){
  options.innerHTML = "";
  opts.forEach(o=>{
    const btn = document.createElement("button");
    btn.innerText = o.label;
    btn.onclick = ()=>{
      addMessage(o.label, "user");
      options.innerHTML = "";
      flows[o.next]();
    };
    options.appendChild(btn);
  });
}

const flows = {
  start: ()=> botFlow([
    "Vou ser direto...",
    "Isso já aconteceu mais de uma vez?"
  ],[
    {label:"Sim", next:"freq"},
    {label:"Não", next:"pontual"}
  ]),

  freq: ()=> botFlow([
    "Entendi.",
    "Isso mexe com sua confiança?",
    "Se tivesse solução discreta, testaria?"
  ],[
    {label:"Sim", next:"interesse"},
    {label:"Talvez", next:"interesse"}
  ]),

  pontual: ()=> botFlow([
    "Ok.",
    "Mas você quer evitar que isso volte?",
    "Prefere prevenir antes de piorar?"
  ],[
    {label:"Sim", next:"interesse"},
    {label:"Sim, prevenir", next:"interesse"}
  ]),

  interesse: ()=> botFlow([
    "Perfeito.",
    "Existe um protocolo discreto que muitos estão usando.",
    "Sem exposição.",
    "Pagamento só na entrega.",
    "Quer ver como funciona?"
  ],[
    {label:"Quero ver", next:"final"}
  ]),

  final: ()=> botFlow([
    "Aqui está.",
    "Entrega sigilosa.",
    "Você só paga quando receber.",
    "Quer garantir o seu agora?"
  ],[
    {label:"Quero receber", next:"redirect"}
  ]),

  redirect: ()=>{
    window.location.href = "https://SEU-LINK-AQUI.com";
  }
};

flows.start();
</script>
</body>
</html>
