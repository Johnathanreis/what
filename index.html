<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimento Urológico</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0b141a;display:flex;justify-content:center;align-items:center;height:100vh}
.phone{width:100%;max-width:420px;height:100vh;background:#efeae2;display:flex;flex-direction:column}

.topbar{background:#075e54;color:#fff;padding:10px;display:flex;align-items:center;gap:10px}
.topbar img{width:40px;height:40px;border-radius:50%;object-fit:cover}

.chat{flex:1;padding:12px;overflow:auto}

.msg{max-width:85%;margin:6px 0;font-size:14px;white-space:pre-line}
.bot{background:#fff;border-radius:12px;padding:10px}
.user{background:#dcf8c6;margin-left:auto;border-radius:12px;padding:10px}

.options{padding:10px}

button{
width:100%;
margin:4px 0;
padding:12px;
border-radius:20px;
border:none;
background:#128c7e;
color:#fff;
cursor:pointer
}

/* typing */
.typing{background:#fff;padding:10px;border-radius:10px;width:60px;display:flex;gap:4px}
.typing div{width:6px;height:6px;background:#999;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* audio */
.audio-message{display:flex;align-items:flex-end;gap:10px}
.audio-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover}
.audio-box{flex:1;background:#e4e6eb;border-radius:18px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.audio-play{border:none;background:none;font-size:22px;cursor:pointer;color:#128c7e}
.audio-progress{flex:1;accent-color:#128c7e}
.audio-time{font-size:12px;color:#555;min-width:40px;text-align:right}

/* recording */
.recording{display:flex;align-items:center;gap:10px;background:#e4e6eb;border-radius:18px;padding:10px 12px}
.recording-wave{display:flex;gap:3px}
.recording-wave div{width:3px;height:10px;background:#999;animation:wave 1s infinite ease-in-out}
.recording-wave div:nth-child(2){animation-delay:.2s}
.recording-wave div:nth-child(3){animation-delay:.4s}
.recording-wave div:nth-child(4){animation-delay:.6s}

@keyframes wave{
0%,100%{transform:scaleY(.5)}
50%{transform:scaleY(1.5)}
}
</style>
</head>
<body>

<div class="phone">

<div class="topbar">
<img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200&auto=format&fit=crop">
<div>
<div><strong>Dr. Rafael - Urologia</strong></div>
<small>online agora</small>
</div>
</div>

<div id="chat" class="chat"></div>
<div id="options" class="options"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

// gravação
function showRecording(){
const wrapper=document.createElement("div");
wrapper.className="msg bot audio-message";

const avatar=document.createElement("img");
avatar.src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=400";
avatar.className="audio-avatar";

const rec=document.createElement("div");
rec.className="recording";

const wave=document.createElement("div");
wave.className="recording-wave";

for(let i=0;i<4;i++){
const bar=document.createElement("div");
wave.appendChild(bar);
}

const text=document.createElement("span");
text.innerText="gravando áudio...";
text.style.fontSize="12px";

rec.appendChild(wave);
rec.appendChild(text);

wrapper.appendChild(avatar);
wrapper.appendChild(rec);

chat.appendChild(wrapper);
chat.scrollTop=chat.scrollHeight;

return wrapper;
}

// audio
function addAudioMessage(src){

const wrapper=document.createElement("div");
wrapper.className="msg bot audio-message";

const avatar=document.createElement("img");
avatar.src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=400";
avatar.className="audio-avatar";

const audioBox=document.createElement("div");
audioBox.className="audio-box";

const playBtn=document.createElement("button");
playBtn.className="audio-play";
playBtn.innerText="▶";

const progress=document.createElement("input");
progress.type="range";
progress.value=0;
progress.min=0;
progress.max=100;
progress.className="audio-progress";

const time=document.createElement("span");
time.className="audio-time";
time.innerText="0:00";

const audio=new Audio(src);

audio.addEventListener("loadedmetadata",()=>{
const min=Math.floor(audio.duration/60);
const sec=Math.floor(audio.duration%60).toString().padStart(2,"0");
time.innerText=`${min}:${sec}`;
});

playBtn.onclick=()=>{
if(audio.paused){
audio.play();
playBtn.innerText="⏸";
}else{
audio.pause();
playBtn.innerText="▶";
}
};

audio.addEventListener("timeupdate",()=>{
progress.value=(audio.currentTime/audio.duration)*100;
});

progress.oninput=()=>{
audio.currentTime=(progress.value/100)*audio.duration;
};

audio.addEventListener("ended",()=>{
playBtn.innerText="▶";
progress.value=0;
});

audioBox.appendChild(playBtn);
audioBox.appendChild(progress);
audioBox.appendChild(time);

wrapper.appendChild(avatar);
wrapper.appendChild(audioBox);

chat.appendChild(wrapper);
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<div></div><div></div><div></div>";
chat.appendChild(typing);
chat.scrollTop=chat.scrollHeight;
return typing;
}

function renderOptions(opts){
options.innerHTML="";
opts.forEach(o=>{
const btn=document.createElement("button");
btn.innerText=o.label;
btn.onclick=()=>{
addMessage(o.label,"user");
options.innerHTML="";
flows[o.next]();
};
options.appendChild(btn);
});
}

const audioMap={
start:"audio1.mp3",
q1:"audio2.mp3",
q2:"audio3.mp3",
q3:"audio4.mp3",
oferta:"audio5.mp3"
};

function botFlow(messages,nextOptions,audioSrc){

const chunks=[];
let buffer=[];
const isQuestion=(t)=>t.trim().endsWith("?");

messages.forEach((m,i)=>{
if(isQuestion(m)){
if(buffer.length){chunks.push(buffer.join("\n"));buffer=[]}
chunks.push(m);
}else{
buffer.push(m);
const next=messages[i+1];
if(!next||isQuestion(next)){
chunks.push(buffer.join("\n"));
buffer=[];
}
}
});

let i=0;

function continueMessages(){

if(i>=chunks.length){
if(nextOptions){renderOptions(nextOptions)}
else{showPlanImage()}
return;
}

const typing=showTyping();

setTimeout(()=>{
typing.remove();
addMessage(chunks[i],"bot");
i++;
setTimeout(continueMessages,2000);
},1500);
}

function nextMessage(){

if(i>=chunks.length){
if(nextOptions){renderOptions(nextOptions)}
else{showPlanImage()}
return;
}

// fluxo com áudio
if(i===0 && audioSrc){

const rec = showRecording();

setTimeout(()=>{
rec.remove();
addAudioMessage(audioSrc);

// 🔥 delay pós áudio
setTimeout(()=>{
continueMessages();
},3000);

},5000);

return;
}

// fallback
continueMessages();
}

nextMessage();
}

function showPlanImage(){
options.innerHTML="";

addMessage(
"Escolha seu tratamento:\n\n1 MES - R$164\n2 MESES - R$199\n3 MESES - R$297",
"bot"
);

const planos=[
{label:"1 MES",value:"1"},
{label:"2 MESES",value:"2"},
{label:"3 MESES",value:"3"}
];

planos.forEach(p=>{
const btn=document.createElement("button");
btn.innerText="Escolher "+p.label;
btn.onclick=()=>{
addMessage(p.label,"user");
flows.redirect(p.value);
};
options.appendChild(btn);
});
}

const flows={

start:()=>botFlow([
"Ola, sou o Dr Rafael.",
"Vou te ajudar de forma discreta.",
"Posso te fazer algumas perguntas?"
],[{label:"Sim",next:"q1"}],audioMap.start),

q1:()=>botFlow([
"Isso acontece com frequencia?"
],[{label:"Sim",next:"q2"},{label:"As vezes",next:"q2"}],audioMap.q1),

q2:()=>botFlow([
"Entendi.",
"Posso te explicar como funciona para você receber?"
],[{label:"Sim",next:"q3"},{label:"Por favor",next:"q3"}],audioMap.q2),

q3:()=>botFlow([
"Certo.",
"Voce quer resolver isso com discricao?"
],[{label:"Sim",next:"oferta"}],audioMap.q3),

oferta:()=>botFlow([
"Perfeito.",
"Existe um protocolo seguro.",
"Sem exposicao.",
"Entrega discreta.",
"Quer ver como funciona?"
],[{label:"Quero ver",next:"final"}],audioMap.oferta),

final:()=>botFlow([
"Funciona assim.",
"Voce recebe em casa.",
"Em embalagem discreta.",
"E paga so na entrega.",
"Sem risco.",
"Agora escolha a duracao do tratamento:"
],null),

redirect:(plano)=>{
const links={
"1":"https://entrega.logzz.com.br/pay/mem4k2o0/promocao-selecao-estimulus---valor-164",
"2":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---2-no-valor-199",
"3":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---3-no-valor-269"
};
window.location.href=links[plano];
}

};

flows.start();

</script>

</body>
</html>
