<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento Urológico</title>

  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial; background:#0b141a; display:flex; justify-content:center; align-items:center; height:100vh; }
    .phone { width:100%; max-width:420px; height:100vh; background:#efeae2; display:flex; flex-direction:column; }
    .topbar { background:#075e54; color:#fff; padding:10px; display:flex; align-items:center; gap:10px; }
    .topbar img { width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .chat { flex:1; padding:12px; overflow:auto; }
    .msg { max-width:80%; padding:10px; border-radius:10px; margin:6px 0; font-size:14px; white-space:pre-line; }
    .bot { background:#fff; }
    .user { background:#dcf8c6; margin-left:auto; }
    .options { padding:10px; }
    button { width:100%; margin:4px 0; padding:12px; border-radius:20px; border:none; background:#128c7e; color:#fff; cursor:pointer; }
    .typing { background:#fff; padding:10px; border-radius:10px; width:60px; display:flex; gap:4px; }
    .typing div { width:6px; height:6px; background:#999; border-radius:50%; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:.3;} 50%{opacity:1;} }
  </style>
</head>
<body>

<div class="phone">

  <div class="topbar">
    <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200&auto=format&fit=crop">
    <div>
      <div><strong>Dr. Rafael • Urologia</strong></div>
      <small>online agora</small>
    </div>
  </div>

  <div id="chat" class="chat"></div>
  <div id="options" class="options"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<div></div><div></div><div></div>";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
  return typing;
}

function renderOptions(opts){
  options.innerHTML = "";

  opts.forEach(o=>{
    const btn = document.createElement("button");
    btn.innerText = o.label;

    btn.onclick = ()=>{
      addMessage(o.label, "user");
      options.innerHTML = "";
      flows[o.next]();
    };

    options.appendChild(btn);
  });
}

function showPlanImage(){
  options.innerHTML = "";

  const img = document.createElement("img");
  img.src = "planos.png";
  img.style.width = "100%";
  img.style.borderRadius = "10px";
  img.style.marginBottom = "10px";

  options.appendChild(img);

  const planos = [
    {label:"1 MÊS", value:"1"},
    {label:"2 MESES", value:"2"},
    {label:"3 MESES", value:"3"}
  ];

  planos.forEach(p=>{
    const btn = document.createElement("button");
    btn.innerText = "Escolher " + p.label;

    btn.onclick = ()=>{
      addMessage(p.label, "user");
      flows.redirect(p.value);
    };

    options.appendChild(btn);
  });
}

function botFlow(messages, nextOptions){

  const chunks = [];
  let buffer = [];

  const isQuestion = (t)=> t.trim().endsWith("?");

  messages.forEach((m,i)=>{
    if(isQuestion(m)){
      if(buffer.length){ chunks.push(buffer.join("\n")); buffer=[]; }
      chunks.push(m);
    } else {
      buffer.push(m);
      const next = messages[i+1];
      if(!next || isQuestion(next)){
        chunks.push(buffer.join("\n"));
        buffer=[];
      }
    }
  });

  let i = 0;

  function nextMessage(){

    if(i >= chunks.length){
      if(nextOptions){ renderOptions(nextOptions); }
      else { showPlanImage(); }
      return;
    }

    if(i === 0){
      const audioMsg = document.createElement("div");
      audioMsg.className = "msg bot";
      audioMsg.innerHTML = "▶️ Áudio (0:12)";
      chat.appendChild(audioMsg);
    }

    const typing = showTyping();

    setTimeout(()=>{
      typing.remove();
      addMessage(chunks[i], "bot");
      i++;
      setTimeout(nextMessage, 3000);
    }, 2000);
  }

  nextMessage();
}

const flows = {

  start: ()=> botFlow([
    "Olá, sou o Dr. Rafael.",
    "Vou te ajudar de forma discreta.",
    "Posso te fazer algumas perguntas?"
  ],[
    {label:"Sim", next:"q1"}
  ]),

  q1: ()=> botFlow([
    "Isso acontece com frequência?"
  ],[
    {label:"Sim", next:"q2"},
    {label:"Às vezes", next:"q2"}
  ]),

  q2: ()=> botFlow([
    "Entendi.",
    "Isso afeta sua confiança?"
  ],[
    {label:"Sim", next:"q3"},
    {label:"Um pouco", next:"q3"}
  ]),

  q3: ()=> botFlow([
    "Certo.",
    "Você quer resolver isso com discrição?"
  ],[
    {label:"Sim", next:"oferta"}
  ]),

  oferta: ()=> botFlow([
    "Perfeito.",
    "Existe um protocolo seguro.",
    "Sem exposição.",
    "Entrega discreta.",
    "Quer ver como funciona?"
  ],[
    {label:"Quero ver", next:"final"}
  ]),

  final: ()=> botFlow([
    "Funciona assim.",
    "Você recebe em casa.",
    "Em embalagem discreta.",
    "E paga só na entrega.",
    "Sem risco.",
    "Agora escolha a duração do tratamento:"
  ], null),

  redirect: (plano)=>{
    const links = {
      "1": "https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---valor-199",
      "2": "https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---2-no-valor-199",
      "3": "https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---3-no-valor-269"
    };

    window.location.href = links[plano];
  }

};

flows.start();

</script>

</body>
</html>
