<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendimento Urológico</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b141a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-size:18px;
}

.phone{
width:100%;
max-width:420px;
height:100vh;
background:#efeae2;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
background:#075e54;
color:#fff;
padding:14px;
display:flex;
align-items:center;
gap:12px;
font-size:17px;
}

.topbar img{
width:48px;
height:48px;
border-radius:50%;
object-fit:cover;
}

/* CHAT */
.chat{
flex:1;
padding:16px;
overflow:auto;
}

/* MENSAGENS */
.msg{
max-width:85%;
margin:10px 0;
font-size:18px;
line-height:1.6;
animation:fadeInUp .3s ease;
}

.bot{
background:#fff;
border-radius:16px;
padding:16px;
}

.user{
background:#dcf8c6;
margin-left:auto;
border-radius:16px;
padding:16px;
}

/* BOTÕES */
.options{
padding:16px;
}

button{
width:100%;
margin:8px 0;
padding:18px;
border-radius:26px;
border:none;
background:#128c7e;
color:#fff;
cursor:pointer;
font-weight:bold;
font-size:19px;
}

button:active{
transform:scale(0.97);
opacity:0.9;
}

/* AUDIO */
.audio-message{
display:flex;
align-items:flex-end;
gap:12px;
}

.audio-avatar{
width:52px;
height:52px;
border-radius:50%;
object-fit:cover;
}

.audio-box{
flex:1;
background:#e4e6eb;
border-radius:20px;
padding:12px 14px;
display:flex;
align-items:center;
gap:12px;
}

.audio-play{
border:none;
background:none;
font-size:26px;
cursor:pointer;
color:#128c7e;
}

.audio-progress{
flex:1;
height:6px;
accent-color:#128c7e;
}

.audio-time{
font-size:14px;
color:#555;
min-width:45px;
text-align:right;
}

/* GRAVAÇÃO */
.recording{
display:flex;
align-items:center;
gap:12px;
background:#e4e6eb;
border-radius:20px;
padding:12px 14px;
font-size:15px;
}

.recording-wave{
display:flex;
gap:4px;
}

.recording-wave div{
width:4px;
height:12px;
background:#999;
animation:wave 1s infinite ease-in-out;
}

.recording-wave div:nth-child(2){animation-delay:.2s}
.recording-wave div:nth-child(3){animation-delay:.4s}
.recording-wave div:nth-child(4){animation-delay:.6s}

@keyframes wave{
0%,100%{transform:scaleY(.5)}
50%{transform:scaleY(1.6)}
}

@keyframes fadeInUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div class="phone">

<div class="topbar">
<img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=200">
<div>
<div><strong>Dr. Rafael - Urologia</strong></div>
<small>online agora</small>
</div>
</div>

<div id="chat" class="chat"></div>
<div id="options" class="options"></div>

</div>

<script>

const chat = document.getElementById("chat");
const options = document.getElementById("options");

let audioCount = 0;

/* DIGITANDO */
function showTyping(){
const div=document.createElement("div");
div.className="msg bot";
div.innerText="Digitando...";
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
return div;
}

/* MENSAGEM COM DELAY */
function addMessage(text,type){

const typing = showTyping();

setTimeout(()=>{

typing.remove();

const div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

},600);
}

/* PLANO */
function showPlanBanner(){
const wrapper=document.createElement("div");
wrapper.className="msg bot";

const img=document.createElement("img");
img.src="plano.png";
img.style.width="100%";
img.style.borderRadius="12px";

wrapper.appendChild(img);
chat.appendChild(wrapper);
}

function showPlanImage(){
options.innerHTML="";

showPlanBanner();

setTimeout(()=>{
addMessage("Escolha seu tratamento:","bot");

const planos=[
{label:"1 MES",value:"1"},
{label:"2 MESES",value:"2"},
{label:"3 MESES",value:"3"}
];

planos.forEach(p=>{
const btn=document.createElement("button");

if(p.value==="3"){
btn.innerText="🔥 MAIS ESCOLHIDO - 3 MESES";
btn.style.background="#ff2d2d";
}else{
btn.innerText="Escolher "+p.label;
}

btn.onclick=()=>{
if(navigator.vibrate){navigator.vibrate(30);}
addMessage(p.label,"user");
flows.redirect(p.value);
};

options.appendChild(btn);
});

},1200);
}

/* GRAVAÇÃO */
function showRecording(){
const wrapper=document.createElement("div");
wrapper.className="msg bot audio-message";

const avatar=document.createElement("img");
avatar.src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=400";
avatar.className="audio-avatar";

const rec=document.createElement("div");
rec.className="recording";

const wave=document.createElement("div");
wave.className="recording-wave";

for(let i=0;i<4;i++){
wave.appendChild(document.createElement("div"));
}

rec.appendChild(wave);
rec.appendChild(document.createElement("span")).innerText="gravando áudio...";

wrapper.append(avatar,rec);
chat.appendChild(wrapper);

return wrapper;
}

/* AUDIO */
function addAudioMessage(src){

const wrapper=document.createElement("div");
wrapper.className="msg bot audio-message";

const avatar=document.createElement("img");
avatar.src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=400";
avatar.className="audio-avatar";

const audioBox=document.createElement("div");
audioBox.className="audio-box";

const playBtn=document.createElement("button");
playBtn.className="audio-play";
playBtn.innerText="▶";

const progress=document.createElement("input");
progress.type="range";
progress.value=0;
progress.min=0;
progress.max=100;
progress.step=0.1;
progress.className="audio-progress";

const time=document.createElement("span");
time.className="audio-time";
time.innerText="0:00";

const audio=new Audio(src);

audio.addEventListener("loadedmetadata",()=>{
if(!isNaN(audio.duration)){
const min=Math.floor(audio.duration/60);
const sec=Math.floor(audio.duration%60).toString().padStart(2,"0");
time.innerText=`${min}:${sec}`;
}
});

audio.addEventListener("timeupdate",()=>{
if(audio.duration){
progress.value=(audio.currentTime/audio.duration)*100;
}
});

progress.addEventListener("input",()=>{
if(audio.duration){
audio.currentTime=(progress.value/100)*audio.duration;
}
});

playBtn.onclick=()=>{
if(audio.paused){
audio.play();
playBtn.innerText="⏸";
}else{
audio.pause();
playBtn.innerText="▶";
}
};

audio.addEventListener("ended",()=>{
playBtn.innerText="▶";
progress.value=0;
});

audioBox.append(playBtn,progress,time);
wrapper.append(avatar,audioBox);
chat.appendChild(wrapper);

return audio;
}

/* OPÇÕES */
function renderOptions(opts){
options.innerHTML="";
opts.forEach(o=>{
const btn=document.createElement("button");
btn.innerText=o.label;

btn.onclick=()=>{
if(navigator.vibrate){navigator.vibrate(30);}
addMessage(o.label,"user");
options.innerHTML="";
flows[o.next]();
};

options.appendChild(btn);
});
}

/* AUDIOS */
const audioMap={
start:"audio1.mp3",
q1:"audio2.mp3",
q2:"audio3.mp3",
q3:"audio4.mp3",
oferta:"audio5.mp3"
};

/* FLUXO */
function botFlow(messages,nextOptions,audioSrc){

audioCount++;
let i=0;

function continueMessages(){
if(i>=messages.length){
if(nextOptions){renderOptions(nextOptions)}
else{showPlanImage()}
return;
}
addMessage(messages[i],"bot");
i++;
setTimeout(continueMessages,1500);
}

function nextMessage(){

if(i===0 && audioSrc){

const rec = showRecording();

setTimeout(()=>{
rec.remove();
addAudioMessage(audioSrc);

const delay = audioCount === 1 ? 3000 : 18000;

setTimeout(()=>{
continueMessages();
},delay);

},5000);

return;
}

continueMessages();
}

nextMessage();
}

/* FLOWS */
const flows={

start:()=>botFlow([
"Ola, sou o Dr Rafael.",
"Vou te ajudar de forma discreta.",
"Posso te fazer algumas perguntas?"
],[{label:"Sim",next:"q1"}],audioMap.start),

q1:()=>botFlow([
"Isso acontece com frequencia?"
],[{label:"Sim",next:"q2"},{label:"As vezes",next:"q2"}],audioMap.q1),

q2:()=>botFlow([
"Entendi.",
"Posso te explicar como funciona para você receber?"
],[{label:"Sim",next:"q3"},{label:"Por favor",next:"q3"}],audioMap.q2),

q3:()=>botFlow([
"Certo.",
"Voce quer resolver isso com discricao?"
],[{label:"Sim",next:"oferta"}],audioMap.q3),

oferta:()=>botFlow([
"Perfeito.",
"Existe um protocolo seguro.",
"Sem exposicao.",
"Entrega discreta.",
"Quer ver como funciona?"
],[{label:"Quero ver",next:"final"}],audioMap.oferta),

final:()=>{
showPlanImage();
},

redirect:(plano)=>{
const links={
"1":"https://entrega.logzz.com.br/pay/mem4k2o0/promocao-selecao-estimulus---valor-164",
"2":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---2-no-valor-199",
"3":"https://entrega.logzz.com.br/pay/mem4k2o0/principal-selecao-estimulus---3-no-valor-269"
};
window.location.href=links[plano];
}

};

flows.start();

</script>

</body>
</html>
