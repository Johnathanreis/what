<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento Urológico</title>
  <style>
    body { margin:0; font-family:Arial; background:#0b141a; display:flex; justify-content:center; }
    .phone { width:100%; max-width:420px; height:100vh; background:#efeae2; display:flex; flex-direction:column; }
    .topbar { background:#075e54; color:#fff; padding:12px; font-weight:bold; }
    .chat { flex:1; padding:12px; overflow:auto; }
    .msg { max-width:80%; padding:10px; border-radius:10px; margin:6px 0; font-size:14px; }
    .bot { background:#fff; }
    .user { background:#dcf8c6; margin-left:auto; }
    .options { padding:10px; }
    button { width:100%; margin:4px 0; padding:12px; border-radius:20px; border:none; background:#128c7e; color:#fff; }
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar">Atendimento Urológico</div>
  <div id="chat" class="chat"></div>
  <div id="options" class="options"></div>
</div>

<script>
const chat = document.getElementById("chat");
const options = document.getElementById("options");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function botFlow(messages, nextOptions){
  for(const msg of messages){
    await delay(5000);
    addMessage(msg, "bot");
  }
  renderOptions(nextOptions);
}

function renderOptions(opts){
  options.innerHTML = "";
  opts.forEach(o=>{
    const btn = document.createElement("button");
    btn.innerText = o.label;
    btn.onclick = ()=>{
      addMessage(o.label, "user");
      options.innerHTML = "";
      flows[o.next]();
    };
    options.appendChild(btn);
  });
}

const flows = {
      start: {
        bot: [
          { text: "Olá. Posso te ajudar rápido.", audio: "01-boas-vindas.mp3" },
          { text: "É algo recente ou já vem acontecendo?" }
        ],
        options: [
          { label: "Recente", next: "controle" },
          { label: "Já acontece há um tempo", next: "controle" }
        ]
      },
      controle: {
        user: "Controle",
        bot: [
          { text: "Entendi.", audio: "02-controle.mp3" },
          { text: "Isso impacta sua confiança hoje?" }
        ],
        options: [
          { label: "Sim", next: "tempo_meses" },
          { label: "Às vezes", next: "tempo_recente" }
        ]
      },
      firmeza: {
        user: "Firmeza",
        bot: [
          { text: "Certo.", audio: "03-firmeza.mp3" },
          { text: "Você quer resolver isso de forma discreta?" }
        ],
        options: [
          { label: "Sim", next: "frequencia_frequente" },
          { label: "Talvez", next: "frequencia_asvezes" }
        ]
      },
      energia: {
        user: "Energia",
        bot: [
          { text: "Perfeito.", audio: "04-energia.mp3" },
          { text: "Você sente queda de disposição com frequência?" }
        ],
        options: [
          { label: "Sim", next: "disposicao" },
          { label: "Não", next: "rotina" }
        ]
      },
      geral: {
        user: "Geral",
        bot: [
          { text: "Vamos direto ao ponto.", audio: "05-geral.mp3" },
          { text: "Você usa algum medicamento contínuo?" }
        ],
        options: [
          { label: "Não", next: "sem_risco" },
          { label: "Sim", next: "risco" }
        ]
      },
      tempo_recente: makeMiddle("Isso começou agora. Quer evitar que vire rotina?"),
      tempo_meses: makeMiddle("Já vem acontecendo. Quer resolver isso de vez?"),
      tempo_longo: makeMiddle("É recorrente. Quer mudar esse cenário?"),
      frequencia_asvezes: makeMiddle("Acontece às vezes. Quer mais controle?"),
      frequencia_frequente: makeMiddle("É frequente. Quer resolver com segurança?"),
      discreto: makeMiddle("Tudo discreto. Podemos seguir?"),
      rotina: makeMiddle("Rotina pesa. Quer melhorar sua performance?"),
      disposicao: makeMiddle("Queda constante. Quer recuperar energia?"),
      performance: makeMiddle("Busca performance. Quer um protocolo?"),
      sem_risco: {
        user: "Não",
        bot: [
          { text: "Ótimo.", audio: "08-recomendacao.mp3" },
          { text: "Posso te mostrar uma recomendação?" }
        ],
        options: [
          { label: "Quero ver", next: "final" },
          { label: "Falar com atendimento", next: "whatsapp" }
        ]
      },
      risco: {
        user: "Sim",
        bot: [
          { text: "Melhor avaliar antes.", audio: "09-seguranca.mp3" },
          { text: "Quer falar com atendimento agora?" }
        ],
        options: [
          { label: "Falar com atendimento", next: "whatsapp" },
          { label: "Refazer", next: "restart" }
        ]
      },
      final: {
        user: "Quero ver",
        bot: [
          { text: "Aqui está.", audio: "10-final.mp3" },
          { text: "Quer acessar agora?" }
        ],
        options: [
          { label: "Acessar", type: "checkout" },
          { label: "Falar antes", type: "whatsapp" }
        ]
      },
      whatsapp: {
        user: "Atendimento",
        bot: [
          { text: "Te direciono agora." }
        ],
        options: [
          { label: "Abrir WhatsApp", type: "whatsapp" }
        ]
      },
      restart: {
        user: "Refazer",
        bot: [],
        options: []
      }
    };

flows.start();
</script>
</body>
</html>
